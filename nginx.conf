# ── HTTP: redirect to HTTPS + ACME challenge ──────────────────────────
server {
    listen 80;
    server_name 167.99.201.200.nip.io www.167.99.201.200.nip.io;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: main server block ──────────────────────────────────────────
server {
    listen 443 ssl;
    server_name 167.99.201.200.nip.io www.167.99.201.200.nip.io;

    ssl_certificate     /etc/letsencrypt/live/167.99.201.200.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/167.99.201.200.nip.io/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Serve the React SPA ───────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Client-side routing: try the file first, fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Reverse-proxy API calls to the Django backend ─────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        send_timeout          300s;
    }

    # ── Reverse-proxy Django admin ────────────────────────────────────
    location /admin/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Serve Django static files (collectstatic output) ──────────────
    location /static/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
    }

    # ── Serve media uploads ───────────────────────────────────────────
    location /media/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
    }

    # ── Gzip for performance ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
}
