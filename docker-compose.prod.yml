services:
  # ── Django Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    container_name: acth-backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    expose:
      - "8000"
    networks:
      - app-network

  # ── React Frontend (Nginx + SSL) ─────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_API_URL: ${VITE_API_URL}
    container_name: acth-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - backend_static:/app/staticfiles:ro
      - backend_media:/app/media:ro
    depends_on:
      - backend
    networks:
      - app-network

  # ── Certbot (SSL certificate auto-renewal) ───────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: acth-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  backend_media:
  backend_static:
  certbot_www:
  certbot_conf:

networks:
  app-network:
    driver: bridge
