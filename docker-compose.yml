services:
  # ── Django Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: acth-backend
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - ALLOWED_HOSTS=*
      - CORS_ALLOWED_ORIGINS=https://167.99.201.200.nip.io,http://167.99.201.200.nip.io,http://167.99.201.200
      - CSRF_TRUSTED_ORIGINS=https://167.99.201.200.nip.io,http://167.99.201.200.nip.io,http://167.99.201.200
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    ports:
      - "8000:8000"
    networks:
      - app-network

  # ── React Frontend (Nginx) ───────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-https://upmyvdybfdcppnlizfxm.supabase.co}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-sb_publishable_DZ8XtX4uTC-YYSLc0OTD0g_-j96NhH0}
    container_name: acth-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - app-network

  # ── Certbot (SSL certificate renewal) ───────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: acth-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - app-network

volumes:
  backend_media:
  backend_static:


networks:
  app-network:
    driver: bridge
