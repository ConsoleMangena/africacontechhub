<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Floor slab -->
  <rect x="2" y="2" width="96" height="96" fill="#efebe9" fill-opacity="0.2" stroke="#795548" stroke-width="1.8"/>
  <!-- Tile pattern -->
  <line x1="26" y1="2" x2="26" y2="98" stroke="#bcaaa4" stroke-width="0.4" opacity="0.3"/>
  <line x1="50" y1="2" x2="50" y2="98" stroke="#bcaaa4" stroke-width="0.4" opacity="0.3"/>
  <line x1="74" y1="2" x2="74" y2="98" stroke="#bcaaa4" stroke-width="0.4" opacity="0.3"/>
  <line x1="2" y1="26" x2="98" y2="26" stroke="#bcaaa4" stroke-width="0.4" opacity="0.3"/>
  <line x1="2" y1="50" x2="98" y2="50" stroke="#bcaaa4" stroke-width="0.4" opacity="0.3"/>
  <line x1="2" y1="74" x2="98" y2="74" stroke="#bcaaa4" stroke-width="0.4" opacity="0.3"/>
  <!-- Roof overhang (dashed) -->
  <rect x="0" y="0" width="100" height="100" fill="none" stroke="#8d6e63" stroke-width="1.2" stroke-dasharray="6 3" opacity="0.4"/>
  <!-- Column posts -->
  <rect x="5" y="5" width="9" height="9" rx="1" fill="#8d6e63" fill-opacity="0.5" stroke="#5d4037" stroke-width="1.2"/>
  <rect x="86" y="5" width="9" height="9" rx="1" fill="#8d6e63" fill-opacity="0.5" stroke="#5d4037" stroke-width="1.2"/>
  <rect x="5" y="86" width="9" height="9" rx="1" fill="#8d6e63" fill-opacity="0.5" stroke="#5d4037" stroke-width="1.2"/>
  <rect x="86" y="86" width="9" height="9" rx="1" fill="#8d6e63" fill-opacity="0.5" stroke="#5d4037" stroke-width="1.2"/>
  <rect x="45" y="5" width="9" height="9" rx="1" fill="#a1887f" fill-opacity="0.45" stroke="#5d4037" stroke-width="1"/>
  <rect x="45" y="86" width="9" height="9" rx="1" fill="#a1887f" fill-opacity="0.45" stroke="#5d4037" stroke-width="1"/>
  <!-- Column inner detail -->
  <rect x="7" y="7" width="5" height="5" fill="none" stroke="#4e342e" stroke-width="0.5" opacity="0.4"/>
  <rect x="88" y="7" width="5" height="5" fill="none" stroke="#4e342e" stroke-width="0.5" opacity="0.4"/>
  <rect x="7" y="88" width="5" height="5" fill="none" stroke="#4e342e" stroke-width="0.5" opacity="0.4"/>
  <rect x="88" y="88" width="5" height="5" fill="none" stroke="#4e342e" stroke-width="0.5" opacity="0.4"/>
</svg>
