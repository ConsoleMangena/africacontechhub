<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Base -->
  <rect x="2" y="2" width="96" height="96" fill="#cfd8dc" fill-opacity="0.2" stroke="#78909c" stroke-width="1.8"/>
  <!-- Herringbone paver pattern - Row 1 -->
  <rect x="4" y="4" width="14" height="28" rx="1" fill="#bcaaa4" fill-opacity="0.2" stroke="#90a4ae" stroke-width="0.5"/>
  <rect x="20" y="4" width="28" height="14" rx="1" fill="#a1887f" fill-opacity="0.18" stroke="#90a4ae" stroke-width="0.5"/>
  <rect x="50" y="4" width="14" height="28" rx="1" fill="#bcaaa4" fill-opacity="0.2" stroke="#90a4ae" stroke-width="0.5"/>
  <rect x="66" y="4" width="28" height="14" rx="1" fill="#a1887f" fill-opacity="0.18" stroke="#90a4ae" stroke-width="0.5"/>
  <!-- Row 2 -->
  <rect x="4" y="34" width="28" height="14" rx="1" fill="#a1887f" fill-opacity="0.18" stroke="#90a4ae" stroke-width="0.5"/>
  <rect x="34" y="20" width="14" height="28" rx="1" fill="#bcaaa4" fill-opacity="0.2" stroke="#90a4ae" stroke-width="0.5"/>
  <rect x="20" y="20" width="14" height="28" rx="1" fill="#d7ccc8" fill-opacity="0.2" stroke="#90a4ae" stroke-width="0.5"/>
  <rect x="66" y="20" width="14" height="28" rx="1" fill="#d7ccc8" fill-opacity="0.2" stroke="#90a4ae" stroke-width="0.5"/>
  <rect x="82" y="20" width="14" height="28" rx="1" fill="#bcaaa4" fill-opacity="0.2" stroke="#90a4ae" stroke-width="0.5"/>
  <!-- Row 3 -->
  <rect x="4" y="50" width="14" height="28" rx="1" fill="#d7ccc8" fill-opacity="0.2" stroke="#90a4ae" stroke-width="0.5"/>
  <rect x="20" y="50" width="28" height="14" rx="1" fill="#bcaaa4" fill-opacity="0.18" stroke="#90a4ae" stroke-width="0.5"/>
  <rect x="50" y="50" width="14" height="28" rx="1" fill="#d7ccc8" fill-opacity="0.2" stroke="#90a4ae" stroke-width="0.5"/>
  <rect x="66" y="50" width="28" height="14" rx="1" fill="#bcaaa4" fill-opacity="0.18" stroke="#90a4ae" stroke-width="0.5"/>
  <!-- Row 4 -->
  <rect x="34" y="66" width="14" height="28" rx="1" fill="#a1887f" fill-opacity="0.2" stroke="#90a4ae" stroke-width="0.5"/>
  <rect x="4" y="80" width="28" height="14" rx="1" fill="#d7ccc8" fill-opacity="0.18" stroke="#90a4ae" stroke-width="0.5"/>
  <rect x="66" y="66" width="14" height="28" rx="1" fill="#a1887f" fill-opacity="0.2" stroke="#90a4ae" stroke-width="0.5"/>
  <rect x="82" y="66" width="14" height="28" rx="1" fill="#bcaaa4" fill-opacity="0.2" stroke="#90a4ae" stroke-width="0.5"/>
  <!-- Edge border -->
  <rect x="2" y="2" width="96" height="96" fill="none" stroke="#607d8b" stroke-width="1.2"/>
</svg>
