<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
  <!-- Outer frame -->
  <rect x="2" y="2" width="96" height="96" stroke-width="2"/>
  <!-- Escalator diagonal with steps -->
  <line x1="10" y1="85" x2="90" y2="15" stroke-width="2"/>
  <!-- Step lines perpendicular to diagonal -->
  <line x1="20" y1="78" x2="28" y2="70" stroke-width="1.5"/>
  <line x1="30" y1="68" x2="38" y2="60" stroke-width="1.5"/>
  <line x1="40" y1="58" x2="48" y2="50" stroke-width="1.5"/>
  <line x1="50" y1="48" x2="58" y2="40" stroke-width="1.5"/>
  <line x1="60" y1="38" x2="68" y2="30" stroke-width="1.5"/>
  <line x1="70" y1="28" x2="78" y2="20" stroke-width="1.5"/>
  <!-- Handrails -->
  <line x1="8" y1="80" x2="85" y2="8" stroke-width="1" stroke-dasharray="4 2"/>
  <line x1="15" y1="90" x2="92" y2="18" stroke-width="1" stroke-dasharray="4 2"/>
</svg>
