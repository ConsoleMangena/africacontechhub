  <line x1="0" y1="20" x2="120" y2="20" stroke-width="1.5"/>
  <!-- Glass panes -->
  <line x1="0" y1="7" x2="120" y2="7" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="0" y1="13" x2="120" y2="13" stroke-width="0.8" stroke-opacity="0.5"/>
  <!-- Center mullion -->
