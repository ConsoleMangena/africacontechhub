<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="tankG" cx="40%" cy="38%">
      <stop offset="0%" stop-color="#90a4ae" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#607d8b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#455a64" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
  <ellipse cx="53" cy="53" rx="43" ry="42" fill="#000" opacity="0.07"/>
  <!-- Tank body -->
  <circle cx="50" cy="50" r="42" fill="url(#tankG)" stroke="#455a64" stroke-width="2"/>
  <!-- Rim highlight -->
  <circle cx="50" cy="50" r="39" fill="none" stroke="#b0bec5" stroke-width="0.8" opacity="0.4"/>
  <!-- Cross structural lines -->
  <line x1="50" y1="10" x2="50" y2="90" stroke="#546e7a" stroke-width="0.8" opacity="0.3"/>
  <line x1="10" y1="50" x2="90" y2="50" stroke="#546e7a" stroke-width="0.8" opacity="0.3"/>
  <!-- WT label -->
  <text x="50" y="44" font-size="14" font-weight="bold" text-anchor="middle" fill="#263238" font-family="sans-serif">WT</text>
  <text x="50" y="62" font-size="9" text-anchor="middle" fill="#546e7a" font-family="sans-serif">5000L</text>
  <!-- Pipe connections -->
  <rect x="90" y="47" width="10" height="6" rx="1" fill="#78909c" stroke="#455a64" stroke-width="0.8"/>
  <rect x="0" y="47" width="10" height="6" rx="1" fill="#78909c" stroke="#455a64" stroke-width="0.8"/>
  <!-- Lid handle -->
  <circle cx="50" cy="50" r="6" fill="none" stroke="#37474f" stroke-width="1.2"/>
  <circle cx="50" cy="50" r="2" fill="#37474f"/>
</svg>
