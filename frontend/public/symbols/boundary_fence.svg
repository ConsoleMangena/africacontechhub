<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Rail lines -->
  <line x1="2" y1="42" x2="98" y2="42" stroke="#78909c" stroke-width="1.8"/>
  <line x1="2" y1="58" x2="98" y2="58" stroke="#78909c" stroke-width="1.8"/>
  <!-- Wire mesh fill -->
  <rect x="2" y="42" width="96" height="16" fill="#90a4ae" fill-opacity="0.08"/>
  <!-- Fence posts (wood) -->
  <rect x="6" y="36" width="10" height="28" rx="1.5" fill="#8d6e63" stroke="#5d4037" stroke-width="1"/>
  <rect x="28" y="36" width="10" height="28" rx="1.5" fill="#8d6e63" stroke="#5d4037" stroke-width="1"/>
  <rect x="50" y="36" width="10" height="28" rx="1.5" fill="#a1887f" stroke="#5d4037" stroke-width="1"/>
  <rect x="72" y="36" width="10" height="28" rx="1.5" fill="#8d6e63" stroke="#5d4037" stroke-width="1"/>
  <!-- Post caps -->
  <rect x="8" y="36" width="6" height="3" rx="1" fill="#6d4c41"/>
  <rect x="30" y="36" width="6" height="3" rx="1" fill="#6d4c41"/>
  <rect x="52" y="36" width="6" height="3" rx="1" fill="#6d4c41"/>
  <rect x="74" y="36" width="6" height="3" rx="1" fill="#6d4c41"/>
  <!-- Cross bracing -->
  <line x1="16" y1="42" x2="28" y2="58" stroke="#5d4037" stroke-width="0.8" opacity="0.5"/>
  <line x1="28" y1="42" x2="16" y2="58" stroke="#5d4037" stroke-width="0.8" opacity="0.5"/>
  <line x1="38" y1="42" x2="50" y2="58" stroke="#5d4037" stroke-width="0.8" opacity="0.5"/>
  <line x1="50" y1="42" x2="38" y2="58" stroke="#5d4037" stroke-width="0.8" opacity="0.5"/>
  <line x1="60" y1="42" x2="72" y2="58" stroke="#5d4037" stroke-width="0.8" opacity="0.5"/>
  <line x1="72" y1="42" x2="60" y2="58" stroke="#5d4037" stroke-width="0.8" opacity="0.5"/>
</svg>
