<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
  <!-- Column cross-section (filled circle) -->
  <circle cx="50" cy="50" r="45" stroke-width="3" fill="currentColor" fill-opacity="0.3"/>
  <!-- Center mark -->
  <line x1="50" y1="20" x2="50" y2="80" stroke-width="1"/>
  <line x1="20" y1="50" x2="80" y2="50" stroke-width="1"/>
</svg>
