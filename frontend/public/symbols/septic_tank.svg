<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
  <!-- Tank outline (rounded rectangle underground) -->
  <rect x="5" y="15" width="90" height="70" rx="12" stroke-width="2.5"/>
  <!-- Internal baffle wall -->
  <line x1="55" y1="15" x2="55" y2="65" stroke-width="2"/>
  <!-- Inlet pipe -->
  <line x1="0" y1="35" x2="5" y2="35" stroke-width="3"/>
  <!-- Outlet pipe -->
  <line x1="95" y1="35" x2="100" y2="35" stroke-width="3"/>
  <!-- Ground level indicator -->
  <line x1="0" y1="10" x2="100" y2="10" stroke-width="1" stroke-dasharray="5 3"/>
</svg>
