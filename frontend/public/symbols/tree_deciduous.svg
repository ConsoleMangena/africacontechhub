<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="canopy" cx="45%" cy="40%">
      <stop offset="0%" stop-color="#4caf50" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#2e7d32" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1b5e20" stop-opacity="0.25"/>
    </radialGradient>
    <radialGradient id="trunk" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#5d4037"/>
      <stop offset="100%" stop-color="#3e2723"/>
    </radialGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="54" cy="54" rx="40" ry="38" fill="#000" opacity="0.08"/>
  <!-- Canopy fill -->
  <circle cx="50" cy="50" r="42" fill="url(#canopy)" stroke="#2e7d32" stroke-width="1.8"/>
  <!-- Canopy lobe details -->
  <circle cx="35" cy="35" r="18" fill="none" stroke="#388e3c" stroke-width="0.8" opacity="0.5"/>
  <circle cx="62" cy="34" r="20" fill="none" stroke="#388e3c" stroke-width="0.8" opacity="0.5"/>
  <circle cx="38" cy="62" r="17" fill="none" stroke="#388e3c" stroke-width="0.8" opacity="0.5"/>
  <circle cx="64" cy="60" r="19" fill="none" stroke="#388e3c" stroke-width="0.8" opacity="0.5"/>
  <circle cx="50" cy="46" r="14" fill="none" stroke="#388e3c" stroke-width="0.6" opacity="0.35"/>
  <!-- Trunk cross-section -->
  <circle cx="50" cy="50" r="5" fill="url(#trunk)" stroke="#3e2723" stroke-width="1.2"/>
  <!-- Trunk rings -->
  <circle cx="50" cy="50" r="3" fill="none" stroke="#4e342e" stroke-width="0.5" opacity="0.5"/>
  <circle cx="50" cy="50" r="1.5" fill="none" stroke="#4e342e" stroke-width="0.4" opacity="0.4"/>
</svg>
