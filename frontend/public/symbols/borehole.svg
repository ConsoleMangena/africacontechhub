<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bhG" cx="45%" cy="45%">
      <stop offset="0%" stop-color="#42a5f5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1565c0" stop-opacity="0.15"/>
    </radialGradient>
  </defs>
  <!-- Protection zone -->
  <circle cx="50" cy="50" r="38" fill="#e3f2fd" fill-opacity="0.15" stroke="#1976d2" stroke-width="1" stroke-dasharray="5 3" opacity="0.6"/>
  <!-- Concrete apron -->
  <circle cx="50" cy="50" r="24" fill="#cfd8dc" fill-opacity="0.4" stroke="#78909c" stroke-width="1.5"/>
  <!-- Casing -->
  <circle cx="50" cy="50" r="12" fill="url(#bhG)" stroke="#1565c0" stroke-width="2"/>
  <!-- Pipe -->
  <circle cx="50" cy="50" r="6" fill="#1976d2" fill-opacity="0.3" stroke="#0d47a1" stroke-width="1.5"/>
  <!-- Water indicator -->
  <circle cx="50" cy="50" r="3" fill="#1976d2" opacity="0.6"/>
  <!-- Cross marker -->
  <line x1="30" y1="50" x2="70" y2="50" stroke="#0d47a1" stroke-width="1" opacity="0.4"/>
  <line x1="50" y1="30" x2="50" y2="70" stroke="#0d47a1" stroke-width="1" opacity="0.4"/>
  <!-- Pipe outlet -->
  <rect x="70" y="47" width="12" height="6" rx="1" fill="#42a5f5" fill-opacity="0.4" stroke="#1565c0" stroke-width="0.8"/>
  <!-- Label -->
  <text x="50" y="94" font-size="11" font-weight="bold" text-anchor="middle" fill="#1565c0" font-family="sans-serif">BH</text>
</svg>
