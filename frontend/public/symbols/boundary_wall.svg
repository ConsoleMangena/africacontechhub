  <line x1="36" y1="44" x2="36" y2="55" stroke="#8d6e63" stroke-width="0.5" opacity="0.4"/>
  <line x1="52" y1="44" x2="52" y2="55" stroke="#8d6e63" stroke-width="0.5" opacity="0.4"/>
