<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="fbSoil" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#6d4c41" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4e342e" stop-opacity="0.15"/>
    </radialGradient>
  </defs>
  <!-- Bed outline -->
  <circle cx="50" cy="50" r="46" fill="url(#fbSoil)" stroke="#5d4037" stroke-width="1.8"/>
  <!-- Decorative edging -->
  <circle cx="50" cy="50" r="43" fill="none" stroke="#8d6e63" stroke-width="0.6" opacity="0.4"/>
  <!-- Inner planting ring -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#388e3c" stroke-width="0.6" opacity="0.3"/>
  <!-- Flowers (colorful) -->
  <circle cx="50" cy="22" r="7" fill="#e91e63" fill-opacity="0.4" stroke="#c2185b" stroke-width="0.8"/>
  <circle cx="74" cy="34" r="6" fill="#ff9800" fill-opacity="0.4" stroke="#e65100" stroke-width="0.8"/>
  <circle cx="74" cy="62" r="7" fill="#9c27b0" fill-opacity="0.35" stroke="#7b1fa2" stroke-width="0.8"/>
  <circle cx="50" cy="78" r="6" fill="#f44336" fill-opacity="0.4" stroke="#c62828" stroke-width="0.8"/>
  <circle cx="26" cy="62" r="7" fill="#ffeb3b" fill-opacity="0.4" stroke="#f9a825" stroke-width="0.8"/>
  <circle cx="26" cy="34" r="6" fill="#e91e63" fill-opacity="0.4" stroke="#c2185b" stroke-width="0.8"/>
  <!-- Flower centers -->
  <circle cx="50" cy="22" r="2.5" fill="#f8bbd0" opacity="0.7"/>
  <circle cx="74" cy="34" r="2" fill="#ffe0b2" opacity="0.7"/>
  <circle cx="74" cy="62" r="2.5" fill="#e1bee7" opacity="0.7"/>
  <circle cx="50" cy="78" r="2" fill="#ffcdd2" opacity="0.7"/>
  <circle cx="26" cy="62" r="2.5" fill="#fff9c4" opacity="0.7"/>
  <circle cx="26" cy="34" r="2" fill="#f8bbd0" opacity="0.7"/>
  <!-- Center focal plant -->
  <circle cx="50" cy="50" r="10" fill="#43a047" fill-opacity="0.35" stroke="#2e7d32" stroke-width="1"/>
  <circle cx="50" cy="50" r="5" fill="#66bb6a" fill-opacity="0.4" stroke="#388e3c" stroke-width="0.7"/>
  <circle cx="50" cy="50" r="2" fill="#1b5e20" opacity="0.5"/>
  <!-- Leaf details between flowers -->
  <ellipse cx="62" cy="26" rx="4" ry="2" fill="#66bb6a" fill-opacity="0.3" transform="rotate(-30 62 26)"/>
  <ellipse cx="76" cy="48" rx="4" ry="2" fill="#66bb6a" fill-opacity="0.3" transform="rotate(60 76 48)"/>
  <ellipse cx="62" cy="72" rx="4" ry="2" fill="#66bb6a" fill-opacity="0.3" transform="rotate(30 62 72)"/>
  <ellipse cx="38" cy="72" rx="4" ry="2" fill="#66bb6a" fill-opacity="0.3" transform="rotate(-30 38 72)"/>
  <ellipse cx="24" cy="48" rx="4" ry="2" fill="#66bb6a" fill-opacity="0.3" transform="rotate(-60 24 48)"/>
  <ellipse cx="38" cy="26" rx="4" ry="2" fill="#66bb6a" fill-opacity="0.3" transform="rotate(30 38 26)"/>
</svg>
