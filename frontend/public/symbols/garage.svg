<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 600" width="100%" height="100%">
  <!-- Garage Outline -->
  <rect x="10" y="10" width="280" height="580" fill="none" stroke="currentColor" stroke-width="4" stroke-dasharray="10 10" opacity="0.6"/>
  <!-- Car Outline (Standard sedan silhouette) -->
  <g stroke="currentColor" stroke-width="4" fill="none" opacity="0.8">
    <!-- Main Body -->
    <rect x="50" y="100" width="200" height="400" rx="30" ry="30"/>
    <!-- Windshield -->
    <path d="M 65 200 Q 150 180 235 200 L 220 280 L 80 280 Z"/>
    <!-- Rear Window -->
    <path d="M 75 420 Q 150 440 225 420 L 210 380 L 90 380 Z"/>
    <!-- Roof lines -->
    <line x1="80" y1="280" x2="65" y2="200" />
    <line x1="220" y1="280" x2="235" y2="200" />
    <!-- Headlights -->
    <rect x="65" y="60" width="30" height="20" rx="10" ry="10"/>
    <rect x="205" y="60" width="30" height="20" rx="10" ry="10"/>
    <!-- Taillights -->
    <rect x="70" y="520" width="40" height="15" fill="none"/>
    <rect x="190" y="520" width="40" height="15" fill="none"/>
    <!-- Side Mirrors -->
    <path d="M 50 220 Q 30 220 35 200 L 55 200" />
    <path d="M 250 220 Q 270 220 265 200 L 245 200" />
  </g>
</svg>
